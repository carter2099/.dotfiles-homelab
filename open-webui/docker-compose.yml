services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    restart: unless-stopped
    # Loopback-only: reachable solely via the CF tunnel (cloudflared hits localhost), never the LAN.
    ports:
      - "127.0.0.1:48100:8080"
    # Resolve host.docker.internal → host gateway so the container can reach
    # loopback-bound services (e.g. SearXNG at 127.0.0.1:8080).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env            # OPENAI_API_KEY (the OpenCode Go key) + WEBUI_SECRET_KEY — gitignored
    environment:
      # Second credential layer behind CF Access (first signup = admin)
      - WEBUI_AUTH=True
      - ENABLE_SIGNUP=False     # no self-registration; admin already created over loopback
      - WEBUI_NAME=Homelab Chat
    volumes:
      - open-webui:/app/backend/data
    networks:
      - default
      - chat-search          # shared with searxng so 'searxng' hostname resolves in-app
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  open-webui:

networks:
  chat-search:
    external: true
    name: homelab-chat-search
